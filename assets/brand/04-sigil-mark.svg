<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="BSD-YBM Sigil">
  <defs>
    <linearGradient id="g-frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="g-inner" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </radialGradient>
    <linearGradient id="g-letters" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Outer golden ring (the seal) -->
  <circle cx="128" cy="128" r="120" fill="url(#g-frame)"/>
  <!-- Inner dark medallion -->
  <circle cx="128" cy="128" r="108" fill="url(#g-inner)"/>
  <!-- Thin inner gold ring -->
  <circle cx="128" cy="128" r="102" fill="none" stroke="url(#g-frame)" stroke-width="1.5" opacity="0.8"/>

  <!-- Decorative dots around the ring (12 points like a compass) -->
  <g fill="#fde68a">
    <circle cx="128" cy="14" r="2.4"/>
    <circle cx="185" cy="29" r="1.6"/>
    <circle cx="227" cy="71" r="1.6"/>
    <circle cx="242" cy="128" r="2.4"/>
    <circle cx="227" cy="185" r="1.6"/>
    <circle cx="185" cy="227" r="1.6"/>
    <circle cx="128" cy="242" r="2.4"/>
    <circle cx="71" cy="227" r="1.6"/>
    <circle cx="29" cy="185" r="1.6"/>
    <circle cx="14" cy="128" r="2.4"/>
    <circle cx="29" cy="71" r="1.6"/>
    <circle cx="71" cy="29" r="1.6"/>
  </g>

  <!-- Interlocking Y + B monogram (italic, serif-inspired) -->
  <!-- Stylized Y with serif feet -->
  <g fill="url(#g-letters)">
    <!-- Y -->
    <path d="M 56 76
             L 80 76
             L 100 116
             L 100 168
             L 124 168
             L 124 116
             L 144 76
             L 168 76
             L 168 82
             L 138 132
             L 138 178
             L 86 178
             L 86 132
             L 56 82 Z"
          opacity="0.95"/>

    <!-- B interlocking, slight overlap with Y stem -->
    <path fill-rule="evenodd" d="
      M 142 76
      L 188 76
      C 204 76 212 86 212 98
      C 212 110 204 116 196 118
      C 206 121 216 130 216 144
      C 216 162 200 180 178 180
      L 142 180 Z
      M 158 90
      L 158 112
      L 184 112
      C 192 112 196 108 196 102
      C 196 96 190 90 184 90 Z
      M 158 126
      L 158 166
      L 178 166
      C 190 166 200 158 200 146
      C 200 134 190 126 178 126 Z"
      opacity="0.96"/>
  </g>

  <!-- Tagline arc — small lowercase wordmark on bottom -->
  <path id="arc-bottom" d="M 50 188 A 90 90 0 0 0 206 188" fill="none"/>
  <text font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="700" letter-spacing="4.5"
        fill="#fde68a" opacity="0.9">
    <textPath href="#arc-bottom" startOffset="50%" text-anchor="middle">bsd · ybm</textPath>
  </text>

  <!-- Top tiny inscription -->
  <text x="128" y="48" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="9" font-weight="700" letter-spacing="3"
        fill="#fde68a" opacity="0.7">EST · 2026</text>
</svg>
