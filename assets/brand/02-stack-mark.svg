<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="BSD-YBM Stack">
  <defs>
    <linearGradient id="s-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="s-block-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="s-block-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="s-block-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="s-block-4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="s-block-5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#s-bg)"/>

  <!-- Subtle blueprint grid -->
  <g opacity="0.06" stroke="#cbd5e1" stroke-width="0.6">
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="192" y1="0" x2="192" y2="256"/>
  </g>

  <!-- Y as stacked blocks: 3 slabs forming a Y shape -->
  <!-- Left arm of Y -->
  <rect x="34" y="56" width="40" height="14" rx="3" fill="url(#s-block-1)"/>
  <rect x="44" y="72" width="36" height="14" rx="3" fill="url(#s-block-1)" opacity="0.92"/>
  <rect x="54" y="88" width="32" height="14" rx="3" fill="url(#s-block-2)" opacity="0.92"/>
  <!-- Right arm of Y -->
  <rect x="98" y="56" width="40" height="14" rx="3" fill="url(#s-block-3)"/>
  <rect x="92" y="72" width="36" height="14" rx="3" fill="url(#s-block-3)" opacity="0.92"/>
  <rect x="86" y="88" width="32" height="14" rx="3" fill="url(#s-block-2)" opacity="0.92"/>
  <!-- Stem of Y -->
  <rect x="60" y="104" width="52" height="14" rx="3" fill="url(#s-block-4)"/>
  <rect x="66" y="120" width="40" height="14" rx="3" fill="url(#s-block-4)" opacity="0.9"/>
  <rect x="70" y="136" width="32" height="14" rx="3" fill="url(#s-block-5)" opacity="0.9"/>
  <rect x="74" y="152" width="24" height="14" rx="3" fill="url(#s-block-5)" opacity="0.85"/>
  <rect x="76" y="168" width="20" height="14" rx="3" fill="url(#s-block-1)" opacity="0.8"/>

  <!-- B as stacked geometric blocks (vertical stem + 2 bumps) -->
  <!-- Stem -->
  <rect x="150" y="56" width="18" height="126" rx="4" fill="url(#s-block-1)"/>
  <!-- Top bump -->
  <rect x="170" y="56" width="38" height="14" rx="3" fill="url(#s-block-3)"/>
  <rect x="170" y="72" width="44" height="14" rx="3" fill="url(#s-block-3)"/>
  <rect x="170" y="88" width="44" height="14" rx="3" fill="url(#s-block-2)"/>
  <rect x="170" y="104" width="38" height="14" rx="3" fill="url(#s-block-2)"/>
  <!-- Mid divider blocks -->
  <rect x="170" y="120" width="32" height="14" rx="3" fill="url(#s-block-4)"/>
  <!-- Bottom bump -->
  <rect x="170" y="136" width="42" height="14" rx="3" fill="url(#s-block-4)"/>
  <rect x="170" y="152" width="46" height="14" rx="3" fill="url(#s-block-5)"/>
  <rect x="170" y="168" width="40" height="14" rx="3" fill="url(#s-block-5)" opacity="0.92"/>

  <!-- Foundation line under everything -->
  <rect x="32" y="200" width="192" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>

  <!-- Tagline -->
  <text x="128" y="226" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="700"
        letter-spacing="5"
        fill="rgba(255,255,255,0.9)">bsd-ybm</text>
</svg>
