<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="BSD-YBM Aurora">
  <defs>
    <!-- Multi-stop aurora gradient (mesh-like via layered radials) -->
    <linearGradient id="a-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <radialGradient id="a-glow1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a-glow2" cx="85%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a-glow3" cx="75%" cy="90%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a-glow4" cx="15%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="a-ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="a-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Squircle background with aurora mesh -->
  <rect x="0" y="0" width="256" height="256" rx="64" ry="64" fill="url(#a-base)"/>
  <rect x="0" y="0" width="256" height="256" rx="64" ry="64" fill="url(#a-glow1)"/>
  <rect x="0" y="0" width="256" height="256" rx="64" ry="64" fill="url(#a-glow2)"/>
  <rect x="0" y="0" width="256" height="256" rx="64" ry="64" fill="url(#a-glow3)"/>
  <rect x="0" y="0" width="256" height="256" rx="64" ry="64" fill="url(#a-glow4)"/>

  <!-- Inner border highlight -->
  <rect x="2" y="2" width="252" height="252" rx="62" ry="62"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- Flowing aurora ribbon (abstract YB shape suggestion) -->
  <path d="M 50 80
           C 80 60, 110 70, 128 110
           C 146 70, 176 60, 206 80
           C 220 100, 215 130, 195 140
           C 220 150, 220 180, 200 195
           C 175 210, 145 200, 138 175
           C 138 165, 138 155, 128 150
           C 118 155, 118 165, 118 175
           C 111 200, 81 210, 56 195
           C 36 180, 36 150, 61 140
           C 41 130, 36 100, 50 80 Z"
        fill="rgba(255,255,255,0.04)" filter="url(#a-blur)"/>

  <!-- Sharp Y stroke (left curve down) -->
  <path d="M 70 78
           C 80 90, 100 110, 115 130
           L 115 178"
        fill="none" stroke="url(#a-ribbon)" stroke-width="14" stroke-linecap="round"/>
  <path d="M 145 78
           C 138 90, 130 110, 128 122"
        fill="none" stroke="url(#a-ribbon)" stroke-width="14" stroke-linecap="round" opacity="0.95"/>

  <!-- B-ish curved form on right (two flowing bowls) -->
  <path d="M 160 78
           L 160 178
           C 195 178, 215 158, 215 138
           C 215 122, 200 115, 190 113
           C 200 110, 213 100, 213 88
           C 213 70, 198 60, 178 60
           L 160 60 Z"
        fill="url(#a-ribbon)" opacity="0.95"/>
  <!-- Cutouts for B -->
  <path d="M 174 76
           L 174 102
           L 188 102
           C 195 102, 199 96, 199 90
           C 199 82, 193 76, 186 76 Z"
        fill="url(#a-base)" opacity="0.95"/>
  <path d="M 174 118
           L 174 162
           L 190 162
           C 200 162, 205 156, 205 144
           C 205 132, 196 118, 186 118 Z"
        fill="url(#a-base)" opacity="0.95"/>

  <!-- Spark stars -->
  <g fill="#fff" opacity="0.85">
    <circle cx="80" cy="60" r="1.8"/>
    <circle cx="200" cy="50" r="1.4"/>
    <circle cx="60" cy="140" r="1.2"/>
    <circle cx="220" cy="200" r="1.6"/>
    <circle cx="40" cy="200" r="1.2"/>
  </g>
</svg>
