<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מצב לא מקוון - BSD-YBM OS</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            color: #94a3b8;
            margin-bottom: 30px;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>אתה לא מחובר לאינטרנט</h1>
    <p>נראה שאין לך חיבור פעיל כרגע. המערכת תהיה זמינה ברגע שתתחבר מחדש.</p>
    <button onclick="window.location.reload()">נסה שוב</button>
</body>
</html>
