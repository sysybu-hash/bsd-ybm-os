name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR (a new push aborts the old run).
# Never cancels main runs, so post-merge validation/deploy always completes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ""

  npm-audit:
    name: Dependency vulnerabilities (npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci --ignore-scripts

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Audit dev dependencies (informational)
        run: npm audit --audit-level=high || true
        continue-on-error: true

  verify:
    name: Lint, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://127.0.0.1:3330
      AUTH_URL: http://127.0.0.1:3330
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3330

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Prepare build env
        run: node scripts/ci-prepare-build-env.mjs

      - name: Lint and type check (parallel)
        run: |
          set -e
          npm run lint &
          lint_pid=$!
          npx tsc --noEmit &
          tsc_pid=$!
          wait "$lint_pid"
          wait "$tsc_pid"

      - name: Unit tests with coverage
        run: npm run test:coverage:ci

      - name: API route audit
        run: node scripts/audit-api-routes.mjs

      - name: Rate limit audit
        run: node scripts/audit-rate-limits.mjs

      - name: Production build
        run: npm run build

  e2e-ci-gate:
    name: Playwright ci-gate
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NEXTAUTH_SECRET: ci-e2e-nextauth-secret-minimum-32-chars-long
      AUTH_SECRET: ci-e2e-nextauth-secret-minimum-32-chars-long
      NEXTAUTH_URL: http://127.0.0.1:3001
      AUTH_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3001
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Prepare build env
        run: node scripts/ci-prepare-build-env.mjs

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply database schema
        run: npx prisma db push --skip-generate

      - name: Seed E2E test data
        run: node scripts/seed-test-data.mjs

      - name: Production build
        run: npm run build

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright chromium only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium

      - name: E2E ci-gate
        run: npm run test:e2e:ci-gate

  lighthouse-mobile:
    name: Lighthouse CI (local)
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      PORT: "3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Prepare build env
        run: node scripts/ci-prepare-build-env.mjs

      - name: Prisma generate
        run: npx prisma generate

      - name: Production build
        run: npm run build

      - name: Lighthouse CI (mobile, local)
        run: npx @lhci/cli@latest autorun --config=lighthouserc.json

      - name: Lighthouse CI (desktop, local)
        run: npx @lhci/cli@latest autorun --config=lighthouserc.desktop.json

  lighthouse-www:
    name: Lighthouse CI (production)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lighthouse CI (mobile, production)
        run: npx @lhci/cli@latest autorun --config=lighthouserc.www.json

      - name: Lighthouse CI (desktop, production)
        run: |
          node -e "
          const fs=require('fs');
          const j=JSON.parse(fs.readFileSync('lighthouserc.www.json','utf8'));
          j.ci.collect.settings.preset='desktop';
          fs.writeFileSync('lighthouserc.www.desktop.json', JSON.stringify(j,null,2));
          "
          npx @lhci/cli@latest autorun --config=lighthouserc.www.desktop.json
