name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ""

  npm-audit:
    name: Dependency vulnerabilities (npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci --ignore-scripts

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Audit dev dependencies (informational)
        run: npm audit --audit-level=high || true
        continue-on-error: true

  verify:
    name: Lint, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://127.0.0.1:3330
      AUTH_URL: http://127.0.0.1:3330
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3330

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare build env
        run: node scripts/ci-prepare-build-env.mjs

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: API route audit
        run: node scripts/audit-api-routes.mjs

      - name: Rate limit audit
        run: node scripts/audit-rate-limits.mjs

      - name: Production build
        run: npm run build

  e2e-ci-gate:
    name: Playwright ci-gate
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://127.0.0.1:3001
      AUTH_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3001
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare build env
        run: node scripts/ci-prepare-build-env.mjs

      - name: Prisma generate
        run: npx prisma generate

      - name: Production build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E ci-gate
        run: npm run test:e2e:ci-gate

  lighthouse-mobile:
    name: Lighthouse CI (local)
    needs: [verify, e2e-ci-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      PORT: "3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare build env
        run: node scripts/ci-prepare-build-env.mjs

      - name: Prisma generate
        run: npx prisma generate

      - name: Production build
        run: npm run build

      - name: Lighthouse CI (mobile, local)
        run: npx @lhci/cli@latest autorun --config=lighthouserc.json

      - name: Lighthouse CI (desktop, local)
        run: npx @lhci/cli@latest autorun --config=lighthouserc.desktop.json

  lighthouse-www:
    name: Lighthouse CI (production)
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lighthouse CI (mobile, production)
        run: npx @lhci/cli@latest autorun --config=lighthouserc.www.json

      - name: Lighthouse CI (desktop, production)
        run: |
          node -e "
          const fs=require('fs');
          const j=JSON.parse(fs.readFileSync('lighthouserc.www.json','utf8'));
          j.ci.collect.settings.preset='desktop';
          fs.writeFileSync('lighthouserc.www.desktop.json', JSON.stringify(j,null,2));
          "
          npx @lhci/cli@latest autorun --config=lighthouserc.www.desktop.json
