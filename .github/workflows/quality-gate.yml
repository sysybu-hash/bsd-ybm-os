name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bsd_ybm_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bsd_ybm_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/bsd_ybm_ci
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://127.0.0.1:3330
      AUTH_URL: http://127.0.0.1:3330
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3330
      PLAYWRIGHT_DEV_PORT: "3330"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build env
        run: node scripts/ci-prepare-build-env.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: API route audit
        run: node scripts/audit-api-routes.mjs

      - name: Production build
        run: npm run build

      - name: Prepare CI database
        run: npx prisma db push --skip-generate

      - name: Seed test data
        run: npm run seed:test

      - name: Browser quality gate
        run: npm run test:e2e:quality

      - name: Workspace E2E (automations + a11y)
        run: npm run test:e2e:workspace
